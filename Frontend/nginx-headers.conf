# Shared headers — included into every `location` block.
#
# ── Why a separate file? ─────────────────────────────────────────
# Stock nginx has a well-known footgun: as soon as a `location` block
# defines ANY `add_header` directive, it stops inheriting the
# server-level ones. So putting headers at the server level looks
# correct but silently drops them for every location that adds its
# own. We work around it by `include`ing this file inside each
# location so the headers are defined IN the location.

# ── Cache policy (intentional no-store everywhere) ─────────────────
# We disable browser caching across the board. The bundle is small
# (~200 KB gzipped); the bandwidth cost is negligible. In exchange we
# get:
#   - Security fixes propagate the moment a user navigates here
#   - No "stale bundle masks a deployed fix" debugging rabbit holes
#   - What you see in the browser is always what's deployed
add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;

# ── Security headers ──────────────────────────────────────────────
# HSTS: 1 year, all subdomains, eligible for preload list.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.plaid.com; style-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.plaid.com; img-src 'self' data: blob: https://*.googleusercontent.com https://*.plaid.com; font-src 'self' data:; frame-src https://accounts.google.com https://*.plaid.com; connect-src 'self' https://accounts.google.com https://*.plaid.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none';" always;
