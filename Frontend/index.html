<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Ledger</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- iOS standalone (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ledger" />

    <!-- Favicon — SVG scales to any size in modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#10b981" />
    <!-- Optional PNGs (gracefully ignored if missing). Drop these in /public to enable:
         /apple-touch-icon.png (180×180), /icon-192.png, /icon-512.png -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS Safari quirks -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Google Identity Services (Sign In With Google) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
