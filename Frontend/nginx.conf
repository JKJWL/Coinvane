server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Hide nginx version ────────────────────────────────────────
    server_tokens off;

    # ── Security headers (applied to all responses) ───────────────
    # HSTS: enforce HTTPS for 1 year + subdomains. Set ONLY if behind HTTPS proxy.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Stop browsers from MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # No clickjacking
    add_header X-Frame-Options "DENY" always;

    # Restrict referer leakage to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Lock down powerful APIs we don't use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # ── Content Security Policy ──────────────────────────────────
    # Allow: self, Google Sign-In, Plaid Link, Google fonts (none used), inline styles for Tailwind
    # script-src needs 'unsafe-inline' for Vite-injected snippets; tightened with strict-dynamic if you go SRI.
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.plaid.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https://*.googleusercontent.com https://*.plaid.com;
      font-src 'self' data:;
      frame-src https://accounts.google.com https://*.plaid.com;
      connect-src 'self' https://accounts.google.com https://*.plaid.com;
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      object-src 'none';
    " always;

    # ── API proxy to backend ─────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Don't cache API responses
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # ── Long-cache hashed static assets ──────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        # Never cache the HTML shell — it embeds the asset hashes
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    # ── Block dotfiles ────────────────────────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
