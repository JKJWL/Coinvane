server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Hide nginx version ────────────────────────────────────────
    server_tokens off;

    # ── Disable any built-in caching directives ───────────────────
    # Belt-and-suspenders alongside the no-store headers in
    # nginx-headers.conf. `expires off` cancels any default Expires
    # header; `etag off` removes the ETag so the browser can't even
    # try a conditional request.
    expires off;
    etag off;

    # ── API proxy to backend ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        include /etc/nginx/snippets/nginx-headers.conf;
    }

    # ── Static assets (JS/CSS bundles, images) ────────────────────
    # Vite hashes these at build time, but we still serve them with
    # no-store to honor the "no client caching" policy. The hash in
    # the filename is harmless — each deploy just gets a new URL.
    location /assets/ {
        include /etc/nginx/snippets/nginx-headers.conf;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    # HTML shell + favicon + manifest + apple-touch-icon all served
    # from here. None of them are cached either.
    location / {
        include /etc/nginx/snippets/nginx-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml;

    # ── Block dotfiles ────────────────────────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
